name: Deploy to AWS Lightsail

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './inventory-api/package-lock.json'

      # --- Build API ---
      - name: Build API
        run: |
          cd inventory-api
          npm install
          npm run build

      # --- Build UI ---
      - name: Build UI
        run: |
          cd inventory-UI
          npm install
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} npm run build

      # --- Deploy via SSH ---
      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER || 'ubuntu' }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "inventory-api/dist,inventory-api/package.json,inventory-api/package-lock.json,inventory-api/ecosystem.config.js,inventory-UI/dist/*"
          target: "~/deploy-tmp"
          strip_components: 0

      - name: Post-deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER || 'ubuntu' }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # Prepare API directory
            mkdir -p ~/ktmg-inventory/api
            cp -r ~/deploy-tmp/inventory-api/* ~/ktmg-inventory/api/
            cd ~/ktmg-inventory/api
            npm install --omit=dev
            
            # Restart API with PM2
            pm2 delete ktmg-inventory-api || true
            pm2 start ecosystem.config.js --env production
            pm2 save

            # Prepare UI directory (Nginx)
            sudo mkdir -p /var/www/html/inventory
            sudo cp -r ~/deploy-tmp/inventory-UI/dist/* /var/www/html/inventory/
            
            # Clean up tmp
            rm -rf ~/deploy-tmp
            
            # Reload Nginx (Assuming config is already set up on server manually or via script)
            sudo systemctl reload nginx
